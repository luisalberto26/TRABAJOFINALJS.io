<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquiler de Vehículos con Persistencia y Filtros</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <h1>Alquiler de Vehículos</h1>
        
        <form id="rental-form" class="rental-form">
            <div class="form-group">
                <label for="vehicle-input">Modelo del Vehículo:</label>
                <input type="text" id="vehicle-input" placeholder="Ej. Toyota Corolla" required>
            </div>
            
            <div class="form-group grid-2">
                <div>
                    <label for="days-input">Días:</label>
                    <input type="number" id="days-input" min="1" placeholder="Ej. 5" required>
                </div>
                <div>
                    <label for="price-input">Precio por día (USD):</label>
                    <input type="number" id="price-input" min="1" placeholder="Ej. 40" required>
                </div>
            </div>
            
            <button type="submit" id="add-btn">Calcular y Registrar</button>
            <div id="loading" class="loading hidden">Consultando tasas de cambio en la API...</div>
        </form>

        <section class="list-section">
            <div class="list-header">
                <h2>Vehículos Registrados</h2>
                <!-- Filtro de ordenamiento -->
                <select id="sort-select" class="sort-select">
                    <option value="default">Ordenar por...</option>
                    <option value="price-asc">Precio: Menor a Mayor</option>
                    <option value="price-desc">Precio: Mayor a Menor</option>
                </select>
            </div>
            <ul id="rental-list" class="rental-list"></ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>

    <script src="script.js"></script>
</body>
</html>
